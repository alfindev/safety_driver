name: Build & Sign APK Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, sqlite3, gd, zip, curl, bcmath

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci
          npm run build

      - name: Setup .env
        run: |
          cp .env.example .env
          php artisan key:generate --force
          echo "NATIVEPHP_APP_ID=com.runner.bloomriverbold" >> .env

      - name: Prepare NativePHP & Bypass iOS
        run: |
          php artisan native:install --no-interaction --force
          rm -rf nativephp/ios
          cat <<EOF > vendor/nativephp/mobile/src/Commands/BuildIosAppCommand.php
          <?php
          namespace Native\Mobile\Commands;
          use Illuminate\Console\Command;
          class BuildIosAppCommand extends Command {
              protected \$signature = 'native:build-ios';
              public function handle() { return 0; }
              public function bundleLaravelApp() { return true; }
          }
          EOF

      # ── 4. PERBAIKAN FILE GRADLE (THE SURGERY) ──
      - name: Patch Broken Gradle Template
        run: |
          # Cari lokasi file build.gradle.kts
          TARGET_FILE=$(find . -name "build.gradle.kts" | grep "app/build.gradle.kts")
          echo "Patching file: $TARGET_FILE"
          
          # Kita ganti placeholder yang error dengan nilai default
          sed -i 's/REPLACEMECODE/1/g' "$TARGET_FILE"
          sed -i 's/REPLACE_MINIFY_ENABLED/false/g' "$TARGET_FILE"
          sed -i 's/REPLACE_SHRINK_RESOURCES/false/g' "$TARGET_FILE"
          
          # Verifikasi hasil patch
          grep -E "versionCode|isMinifyEnabled|isShrinkResources" "$TARGET_FILE"

      # ── 5. MANUAL GRADLE BUILD ──
      - name: Build with Gradle Manual
        run: |
          DIR=$(find . -name "gradlew" -exec dirname {} \; | head -n 1)
          cd "$DIR"
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      # ── 6. MENGUMPULKAN HASIL ──
      - name: Collect APK
        run: |
          mkdir -p final-build-output
          find . -name "*.apk" -exec cp {} ./final-build-output/ \;
          ls ./final-build-output/

      # ── 7. SIGNING ──
      - name: Sign APK Release
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: final-build-output
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload Official APK
        uses: actions/upload-artifact@v4
        with:
          name: Safety-Driver-Final-Signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}