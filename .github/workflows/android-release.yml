name: Build & Sign APK Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP & Java
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, sqlite3, gd, zip, curl, bcmath

      - name: Setup Java (For Signing)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci
          npm run build

      - name: Prepare NativePHP
        run: |
          php artisan native:install --no-interaction --force
          rm -rf nativephp/ios
          mkdir -p vendor/nativephp/mobile/src/Commands
          cat <<EOF > vendor/nativephp/mobile/src/Commands/BuildIosAppCommand.php
          <?php
          namespace Native\Mobile\Commands;
          use Illuminate\Console\Command;
          class BuildIosAppCommand {
              protected \$signature = 'native:build-ios';
              public function handle() { return 0; }
              public function bundleLaravelApp() { return true; }
          }
          EOF

      - name: Patch & Branding
        run: |
          find nativephp/android -type f -exec sed -i 's/REPLACE_APP_ID/com.runner.bloomriverbold/g' {} +
          STRINGS_FILE="nativephp/android/app/src/main/res/values/strings.xml"
          [ -f "$STRINGS_FILE" ] && sed -i 's/REPLACE_APP_NAME/Safety Driver/g' "$STRINGS_FILE"

          GRADLE_FILE="nativephp/android/app/build.gradle.kts"
          if [ -f "$GRADLE_FILE" ]; then
            sed -i 's/REPLACEMECODE/1/g' "$GRADLE_FILE"
            sed -i 's/REPLACE_MINIFY_ENABLED/false/g' "$GRADLE_FILE"
            sed -i 's/REPLACE_SHRINK_RESOURCES/false/g' "$GRADLE_FILE"
            sed -i 's/REPLACE_DEBUG_SYMBOLS/none/g' "$GRADLE_FILE"
          fi

      - name: Build Unsigned APK
        run: |
          cd nativephp/android
          chmod +x gradlew
          ./gradlew assembleRelease

      # ── SIGNING DENGAN SECRET KEYSTORE ──
      - name: Sign APK with Uber-APK-Signer
        env:
          # Menggunakan nama secret 'KEYSTORE' sesuai permintaanmu
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE }}
          APP_ALIAS: ${{ secrets.ALIAS }}
          STORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p signed-output
          RAW_APK=$(find nativephp/android/app/build/outputs/apk/release -name "*.apk" | head -n 1)

          # Download tool signer
          curl -L -o uber-apk-signer.jar https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar

          # Decode file keystore dari secret KEYSTORE
          echo "$ENCODED_KEYSTORE" | base64 -d > release.jks

          # Jalankan signing
          java -jar uber-apk-signer.jar \
            --apks "$RAW_APK" \
            --ks release.jks \
            --ksAlias "$APP_ALIAS" \
            --ksPass "$STORE_PASS" \
            --ksKeyPass "$KEY_PASS" \
            --out signed-output

          mv signed-output/*-aligned-signed.apk signed-output/Safety-Driver-Final.apk

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Safety-Driver-App
          path: signed-output/Safety-Driver-Final.apk
