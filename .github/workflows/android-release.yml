name: Build & Sign APK Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, sqlite3, gd, zip, curl, bcmath

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci
          npm run build

      - name: Setup .env
        run: |
          cp .env.example .env
          php artisan key:generate --force
          echo "NATIVEPHP_APP_ID=com.runner.bloomriverbold" >> .env

      # ── 3. Persiapan NativePHP & Generate Folder Android ──
      - name: Prepare NativePHP Project
        run: |
          php artisan native:install --no-interaction --force
          # Pastikan folder android digenerate
          php artisan native:build --no-interaction || echo "Native build command stopped, continuing manual..."
          rm -rf nativephp/ios

      # ── 4. MANUAL GRADLE BUILD (Langkah Pasti) ──
      - name: Build with Gradle Manual
        run: |
          # Cari di mana folder android berada, lalu masuk dan build
          if [ -d "nativephp/android" ]; then
            cd nativephp/android
          elif [ -d "android" ]; then
            cd android
          fi
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      # ── 5. MENGUMPULKAN HASIL ──
      - name: Collect APK
        run: |
          mkdir -p final-build-output
          find . -name "*release*.apk" -exec cp {} ./final-build-output/ \;
          echo "Isi folder output:"
          ls ./final-build-output/

      # ── 6. SIGNING ──
      - name: Sign APK Release
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: final-build-output
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload Official APK
        uses: actions/upload-artifact@v4
        with:
          name: Safety-Driver-Signed-Official
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
