name: Build & Sign APK Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, sqlite3, gd, zip, curl, bcmath

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci
          npm run build

      - name: Setup .env
        run: |
          cp .env.example .env
          php artisan key:generate --force
          echo "NATIVEPHP_APP_ID=com.runner.bloomriverbold" >> .env

      - name: Prepare NativePHP & Bypass iOS
        run: |
          php artisan native:install --no-interaction --force
          rm -rf nativephp/ios
          # Membuat dummy command agar artisan tidak error saat mencari class iOS
          mkdir -p vendor/nativephp/mobile/src/Commands
          cat <<EOF > vendor/nativephp/mobile/src/Commands/BuildIosAppCommand.php
          <?php
          namespace Native\Mobile\Commands;
          use Illuminate\Console\Command;
          class BuildIosAppCommand extends Command {
              protected \$signature = 'native:build-ios';
              public function handle() { return 0; }
              public function bundleLaravelApp() { return true; }
          }
          EOF

      # ── 4. BRANDING: IKON & NAMA APLIKASI ──
      - name: Setup Branding (Icon & Name)
        run: |
          # 1. Update Ikon (Pastikan ada file di public/icon.png)
          SOURCE_ICON="public/icon.png"
          TARGET_DIR="nativephp/android/app/src/main/res/mipmap-xxxhdpi"
          if [ -f "$SOURCE_ICON" ]; then
            mkdir -p "$TARGET_DIR"
            cp "$SOURCE_ICON" "$TARGET_DIR/ic_launcher.png"
            cp "$SOURCE_ICON" "$TARGET_DIR/ic_launcher_round.png"
            echo "Icon updated."
          fi

          # 2. Update Nama Aplikasi di strings.xml
          STRINGS_FILE="nativephp/android/app/src/main/res/values/strings.xml"
          if [ -f "$STRINGS_FILE" ]; then
            sed -i 's/REPLACE_APP_NAME/Safety Driver/g' "$STRINGS_FILE"
          fi

      # ── 5. OPERASI BEDAH PLACEHOLDER (GANTI SEMUA VARIABLE RUSAK) ──
      - name: Force Patch Placeholder
        run: |
          # Ganti REPLACE_APP_ID di semua file dalam folder android
          find nativephp/android -type f -exec sed -i 's/REPLACE_APP_ID/com.runner.bloomriverbold/g' {} +
          
          # Patch spesifik untuk file Gradle (Placeholder NativePHP)
          GRADLE_FILE="nativephp/android/app/build.gradle.kts"
          if [ -f "$GRADLE_FILE" ]; then
            sed -i 's/REPLACEMECODE/1/g' "$GRADLE_FILE"
            sed -i 's/REPLACE_MINIFY_ENABLED/false/g' "$GRADLE_FILE"
            sed -i 's/REPLACE_SHRINK_RESOURCES/false/g' "$GRADLE_FILE"
            sed -i 's/REPLACE_DEBUG_SYMBOLS/none/g' "$GRADLE_FILE"
          fi
          echo "Patching completed."

      # ── 6. MANUAL GRADLE BUILD (MENGHASILKAN APK) ──
      - name: Build with Gradle Manual
        run: |
          cd nativephp/android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      # ── 7. MENGUMPULKAN HASIL APK ──
      - name: Collect APK
        run: |
          mkdir -p final-build-output
          find nativephp/android/app/build/outputs/apk/release -name "*.apk" -exec cp {} ./final-build-output/ \;
          echo "Isi folder output:"
          ls ./final-build-output/

      # ── 8. SIGNING (PEMBERIAN TANDA TANGAN DIGITAL) ──
      - name: Sign APK Release
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: final-build-output
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      # Backup: Jika signing gagal, kita tetap bisa ambil APK mentah untuk dicek
      - name: Upload Unsigned APK (Backup)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Safety-Driver-Unsigned-Build
          path: final-build-output/*.apk

      # Success: Upload APK yang sudah ditandatangani dan siap install
      - name: Upload Official Signed APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Safety-Driver-Final-Signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}