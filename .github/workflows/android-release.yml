name: Build & Sign APK Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, sqlite3, gd, zip, curl, bcmath

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci
          npm run build

      - name: Setup .env
        run: |
          cp .env.example .env
          php artisan key:generate --force
          echo "NATIVEPHP_APP_ID=com.runner.bloomriverbold" >> .env

      - name: Prepare NativePHP & Bypass iOS
        run: |
          php artisan native:install --no-interaction --force
          rm -rf nativephp/ios
          cat <<EOF > vendor/nativephp/mobile/src/Commands/BuildIosAppCommand.php
          <?php
          namespace Native\Mobile\Commands;
          use Illuminate\Console\Command;
          class BuildIosAppCommand extends Command {
              protected \$signature = 'native:build-ios';
              public function handle() { return 0; }
              public function bundleLaravelApp() { return true; }
          }
          EOF

      - name: Build Android APK
        run: php artisan native:build --no-interaction -vvv
        env:
          NODE_ENV: production

      # ── DEBUGGING TOTAL ──
      - name: Deep Search for APKs
        run: |
          mkdir -p final-build-output
          echo "--- SELURUH FILE APK YANG ADA ---"
          find . -name "*.apk"
          echo "--- SELURUH FILE AAB YANG ADA ---"
          find . -name "*.aab"

          echo "--- MEMINDAHKAN SEMUA APK YANG KETEMU ---"
          # Kita ambil semua APK yang ketemu, mau debug atau release kita sikat dulu biar tidak error
          find . -name "*.apk" -exec cp {} ./final-build-output/ \;

          echo "--- ISI FOLDER OUTPUT ---"
          ls ./final-build-output/

      - name: Sign APK Release
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        if: success()
        with:
          releaseDirectory: final-build-output
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload Official APK
        uses: actions/upload-artifact@v4
        with:
          name: Safety-Driver-Final-Package
          path: |
            ${{ steps.sign_app.outputs.signedReleaseFile }}
            final-build-output/*.apk
          if-no-files-found: warn
