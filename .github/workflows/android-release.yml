name: Build & Sign APK Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, sqlite3, gd, zip, curl, bcmath

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci
          npm run build

      - name: Setup .env
        run: |
          cp .env.example .env
          php artisan key:generate --force
          echo "NATIVEPHP_APP_ID=com.runner.bloomriverbold" >> .env

      - name: Prepare NativePHP & Bypass iOS
        run: |
          php artisan native:install --no-interaction --force
          rm -rf nativephp/ios
          cat <<EOF > vendor/nativephp/mobile/src/Commands/BuildIosAppCommand.php
          <?php
          namespace Native\Mobile\Commands;
          use Illuminate\Console\Command;
          class BuildIosAppCommand extends Command {
              protected \$signature = 'native:build-ios';
              public function handle() { return 0; }
              public function bundleLaravelApp() { return true; }
          }
          EOF

      # ── 4. PERBAIKAN FILE GRADLE (V3 - Anti Placeholder) ──
      - name: Patch Broken Gradle Template
        run: |
          TARGET_FILE="nativephp/android/app/build.gradle.kts"
          
          if [ -f "$TARGET_FILE" ]; then
            echo "Patching file: $TARGET_FILE"
            sed -i 's/REPLACEMECODE/1/g' "$TARGET_FILE"
            sed -i 's/REPLACE_MINIFY_ENABLED/false/g' "$TARGET_FILE"
            sed -i 's/REPLACE_SHRINK_RESOURCES/false/g' "$TARGET_FILE"
            # Perbaikan untuk error DebugSymbolLevel
            sed -i 's/REPLACE_DEBUG_SYMBOLS/none/g' "$TARGET_FILE"
            
            echo "Verifying patch result..."
            grep -E "versionCode|isMinifyEnabled|isShrinkResources|debugSymbolLevel" "$TARGET_FILE" || true
          else
            echo "Error: $TARGET_FILE not found!"
            exit 1
          fi

      # ── 5. MANUAL GRADLE BUILD ──
      - name: Build with Gradle Manual
        run: |
          cd nativephp/android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      # ── 6. MENGUMPULKAN HASIL ──
      - name: Collect APK
        run: |
          mkdir -p final-build-output
          # Mencari APK hasil build assembleRelease
          find nativephp/android/app/build/outputs/apk/release -name "*.apk" -exec cp {} ./final-build-output/ \;
          echo "Isi folder output:"
          ls ./final-build-output/

      # ── 7. SIGNING ──
      - name: Sign APK Release
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: final-build-output
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload Official APK
        uses: actions/upload-artifact@v4
        with:
          name: Safety-Driver-Final-Signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}