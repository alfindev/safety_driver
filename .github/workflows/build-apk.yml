name: Build APK Android

on:
  push:
    branches: [main]
  workflow_dispatch: # Bisa dijalankan manual dari tab Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, sqlite3, gd, zip, curl, bcmath
          coverage: none

      # ── 3. Setup Node.js (Penting untuk bundling aset)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 4. Setup Java (Wajib untuk Android/Gradle)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ── 5. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 6. Install System Dependencies (Mencegah error ZIP)
      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip libnss3-dev

      # ── 7. Install Composer dependencies
      - name: Install Composer
        run: composer install --no-dev --optimize-autoloader --no-interaction

      # ── 8. Setup .env
      - name: Setup environment
        run: |
          cp .env.example .env
          php artisan key:generate --force
          echo "DB_CONNECTION=sqlite" >> .env

      # ── 9. Install NPM & Build assets
      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      # ── 10. Install & Publish NativePHP
      - name: Prepare NativePHP
        run: |
          php artisan native:install --no-interaction --force
          php artisan native:publish

      # ── 11. Build APK Android
      # Menambahkan 'android' setelah build untuk memastikan hanya target ini yang diproses
      - name: Build Android APK
        run: php artisan native:build android --no-interaction -vvv
        env:
          NODE_ENV: production

      # ── 12. Cari dan Upload APK
      # Menggunakan wildcard yang lebih luas karena path output bisa bervariasi tergantung versi
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: safety-driver-apk
          path: |
            dist/android/*.apk
            storage/nativephp/builds/android/*.apk
            android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30
