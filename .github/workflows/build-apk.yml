name: Build APK Android

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, sqlite3, gd, zip, curl, bcmath
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip libnss3-dev

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup environment
        run: |
          cp .env.example .env
          php artisan key:generate --force
          echo "DB_CONNECTION=sqlite" >> .env
          echo "NATIVEPHP_APP_ID=com.runner.bloomriverbold" >> .env

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      # ── 10. Trik bypass iOS ──
      - name: Fix NativePHP Command Conflict
        run: |
          php artisan native:install --no-interaction --force
          # Hapus project ios
          rm -rf nativephp/ios
          # Hapus secara paksa file Command iOS di vendor agar tidak dipanggil oleh native:build
          find vendor/nativephp/mobile/src/Commands -name "BuildIosAppCommand.php" -delete

      - name: Build Android APK
        run: php artisan native:build --no-interaction -vvv
        env:
          NODE_ENV: production

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: safety-driver-apk
          path: |
            dist/android/*.apk
            storage/nativephp/builds/android/*.apk
            android/app/build/outputs/apk/**/*.apk
            nativephp/android/app/build/outputs/apk/**/*.apk
            **/*.apk
          if-no-files-found: warn
