- name: Generate Keystore & Sign APK
  run: |
    # Generate keystore langsung di CI (tidak perlu lokal)
    keytool -genkeypair -v \
      -keystore release.jks \
      -alias safety-driver \
      -keyalg RSA \
      -keysize 2048 \
      -validity 10000 \
      -storepass password123 \
      -keypass password123 \
      -dname "CN=Safety Driver, OU=IT, O=Perusahaan, L=Jakarta, S=DKI, C=ID"

    mkdir -p signed-output
    RAW_APK=$(find nativephp/android/app/build/outputs/apk/release -name "*.apk" | head -n 1)

    curl -L -o uber-apk-signer.jar https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar

    java -jar uber-apk-signer.jar \
      --apks "$RAW_APK" \
      --ks release.jks \
      --ksAlias safety-driver \
      --ksPass password123 \
      --ksKeyPass password123 \
      --out signed-output

    find signed-output -name "*-signed.apk" -exec mv {} signed-output/Safety-Driver-Final.apk \;
