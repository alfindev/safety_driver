name: Build APK Android

on:
  push:
    branches: [main]
  workflow_dispatch: # bisa trigger manual dari GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, sqlite3, gd, zip, curl
          coverage: none

      # ── 3. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 4. Setup Java (wajib untuk Android build)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ── 5. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 6. Install Composer dependencies
      - name: Install Composer
        run: composer install --no-dev --optimize-autoloader --no-interaction

      # ── 7. Setup .env
      - name: Setup environment
        run: |
          cp .env.example .env
          echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env
          echo "DB_CONNECTION=sqlite" >> .env
          echo "MAIL_MAILER=smtp" >> .env
          echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" >> .env
          echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> .env

      # ── 8. Generate app key (kalau APP_KEY secret belum diset)
      - name: Generate App Key
        run: php artisan key:generate --force

      # ── 9. Install NPM & Build assets
      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      # ── 10. Install NativePHP
      - name: Install NativePHP
        run: php artisan native:install --no-interaction

      # ── 11. Build APK
      - name: Build Android APK
        run: php artisan native:build android --no-interaction

      # ── 12. Upload APK sebagai artifact (bisa didownload)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: safety-driver-apk
          path: dist/android/*.apk
          retention-days: 30
