name: Generate Keystore

on: workflow_dispatch # Hanya jalan kalau kamu klik tombol di GitHub

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Create Keystore
        run: |
          keytool -genkeypair -v \
            -keystore release-key.jks \
            -alias my-key-alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass password123 \
            -keypass password123 \
            -dname "CN=Safety Driver, OU=Dev, O=SafetyDriver, L=Jakarta, S=DKI, C=ID"
            
      - name: Convert to Base64 (Untuk GitHub Secrets)
        run: |
          echo "COPY KODE DI BAWAH INI UNTUK SIGNING_KEY SECRET:"
          base64 -w 0 release-key.jks > keystore_base64.txt
          cat keystore_base64.txt

      - name: Upload Keystore File (Download & Simpan!)
        uses: actions/upload-artifact@v4
        with:
          name: my-secure-keystore
          path: release-key.jks